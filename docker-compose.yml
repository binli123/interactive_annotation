services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      INTERACTIVE_ANNOTATION_PROJECT_ROOT: /app
      INTERACTIVE_ANNOTATION_DATA_ROOT: /data
      INTERACTIVE_ANNOTATION_LINEAGE_ROOT: /data/lineages_current
      INTERACTIVE_ANNOTATION_GLOBAL_OBJECT_PATH: /data/adata_global.h5ad
      INTERACTIVE_ANNOTATION_CORS_ORIGINS: http://127.0.0.1:${INTERACTIVE_ANNOTATION_PORT:-5173},http://localhost:${INTERACTIVE_ANNOTATION_PORT:-5173}
    volumes:
      - ./data:/data
      - ./.move_undo:/app/.move_undo
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: /api
        VITE_DEFAULT_FOLDER: /data/lineages_current
    ports:
      - "${INTERACTIVE_ANNOTATION_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
